<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d7377"/>
      <stop offset="100%" style="stop-color:#14a3a8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8590c"/>
      <stop offset="100%" style="stop-color:#ffa94d"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#g1)" stroke="#0a5c5f" stroke-width="2"/>
  <!-- Outer gear teeth -->
  <g fill="#ffffff" opacity="0.15">
    <rect x="88" y="4" width="24" height="20" rx="3"/>
    <rect x="88" y="176" width="24" height="20" rx="3"/>
    <rect x="4" y="88" width="20" height="24" rx="3"/>
    <rect x="176" y="88" width="20" height="24" rx="3"/>
    <rect x="27" y="27" width="20" height="20" rx="3" transform="rotate(45 37 37)"/>
    <rect x="153" y="27" width="20" height="20" rx="3" transform="rotate(45 163 37)"/>
    <rect x="27" y="153" width="20" height="20" rx="3" transform="rotate(45 37 163)"/>
    <rect x="153" y="153" width="20" height="20" rx="3" transform="rotate(45 163 163)"/>
  </g>
  <!-- Inner gear ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
  <circle cx="100" cy="100" r="40" fill="rgba(0,0,0,0.15)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Robot face -->
  <rect x="72" y="70" width="56" height="48" rx="8" fill="rgba(255,255,255,0.9)"/>
  <!-- Eyes: LED style -->
  <circle cx="86" cy="90" r="7" fill="url(#g2)"/>
  <circle cx="114" cy="90" r="7" fill="url(#g2)"/>
  <circle cx="86" cy="90" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="114" cy="90" r="3" fill="#fff" opacity="0.7"/>
  <!-- Mouth: circuit line -->
  <line x1="85" y1="106" x2="100" y2="106" stroke="#0d7377" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="106" x2="100" y2="110" stroke="#0d7377" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="110" x2="115" y2="110" stroke="#0d7377" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Circuit traces from head -->
  <line x1="100" y1="70" x2="100" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="100" cy="52" r="3" fill="url(#g2)"/>
  <line x1="72" y1="85" x2="55" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="52" cy="85" r="3" fill="url(#g2)"/>
  <line x1="128" y1="85" x2="145" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="148" cy="85" r="3" fill="url(#g2)"/>
  <!-- Antenna -->
  <line x1="100" y1="52" x2="100" y2="38" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="35" r="4" fill="url(#g2)" stroke="#fff" stroke-width="1"/>
  <!-- Circuit nodes bottom -->
  <line x1="85" y1="118" x2="85" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="85" y1="140" x2="70" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="67" cy="140" r="2.5" fill="url(#g2)"/>
  <line x1="115" y1="118" x2="115" y2="135" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="115" y1="135" x2="135" y2="135" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="138" cy="135" r="2.5" fill="url(#g2)"/>
  <line x1="100" y1="118" x2="100" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="100" cy="153" r="2.5" fill="url(#g2)"/>
</svg>
